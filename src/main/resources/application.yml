spring:
  application:
    name: notifly

  datasource:
    url: jdbc:postgresql://localhost:5432/notifly
    username: notifly
    password: notifly
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false  # importante: evita lazy loading no controller

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "br.com.notifly.*"
      auto-offset-reset: earliest
      enable-auto-commit: false  # commit manual, parte da sem‚ntica at-least-once

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

server:
  port: 8080
  shutdown: graceful  # importante: drain de requests in-flight no shutdown

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  observations:
    annotations:
      enabled: true

logging:
  level:
    br.com.notifly: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # mostra valores dos par‚metros SQL em dev
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"